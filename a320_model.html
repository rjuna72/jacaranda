
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>A320 Model Viewer</title>
</head>
<body style="margin:0;background:#020617;overflow:hidden;">
  <canvas id="c"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x030712);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0,3,12);

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5,10,7);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x6699ff, 0.6));

    const aircraft = new THREE.Group();
    scene.add(aircraft);

    const white = new THREE.MeshStandardMaterial({color:0xf7fbff, metalness:0.4, roughness:0.3});
    const blue = new THREE.MeshStandardMaterial({color:0x0ea5e9});

    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.7,8,64), white);
    body.rotation.z = Math.PI/2;
    aircraft.add(body);

    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.7,32,32), white);
    nose.scale.set(1,1,1.6);
    nose.position.set(4.3,0,0);
    aircraft.add(nose);

    const wingL = new THREE.Mesh(new THREE.BoxGeometry(5,0.1,1.4), white);
    wingL.position.set(-0.6,0,0);
    wingL.rotation.z = 0.08;
    aircraft.add(wingL);

    const tail = new THREE.Mesh(new THREE.BoxGeometry(0.1,2,1), blue);
    tail.position.set(-4,1.1,0);
    aircraft.add(tail);

    function animate(){
      requestAnimationFrame(animate);
      aircraft.rotation.y += 0.004;
      renderer.render(scene,camera);
    }
    animate();

    window.addEventListener('resize',()=>{
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>

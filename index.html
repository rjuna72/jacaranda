<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airbus A320 — Polished Interactive Model</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #16243d 0%, #07101f 45%, #02050a 100%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .panel {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.35);
    }
    #title {
      top: 22px;
      left: 22px;
      padding: 18px 20px;
      border-radius: 22px;
      max-width: 330px;
    }
    #title h1 {
      font-size: 24px;
      font-weight: 720;
      letter-spacing: -0.03em;
      margin-bottom: 5px;
    }
    #title p {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.62);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #specs {
      top: 22px;
      right: 22px;
      padding: 16px 18px;
      border-radius: 20px;
      min-width: 190px;
    }
    .spec {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 6px 0;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .spec:last-child { border-bottom: none; }
    .spec strong { color: rgba(255,255,255,0.86); font-weight: 600; }
    #controls {
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255,255,255,0.68);
      letter-spacing: 0.02em;
    }
    #liveries {
      position: fixed;
      z-index: 11;
      right: 22px;
      bottom: 22px;
      display: flex;
      gap: 8px;
    }
    button {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.72);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }
    button:hover, button.active {
      background: rgba(255,255,255,0.2);
      color: white;
      transform: translateY(-1px);
    }
    @media (max-width: 760px) {
      #specs { display: none; }
      #liveries { left: 16px; right: 16px; justify-content: center; flex-wrap: wrap; }
      #controls { bottom: 76px; white-space: nowrap; }
      #title { right: 16px; left: 16px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <section id="title" class="panel">
    <h1>Airbus A320-200</h1>
    <p>Interactive 3D aircraft model · CFM56-style engines · A320 sharklets</p>
  </section>

  <section id="specs" class="panel">
    <div class="spec"><span>Length</span><strong>37.57 m</strong></div>
    <div class="spec"><span>Wingspan</span><strong>35.80 m</strong></div>
    <div class="spec"><span>Cruise</span><strong>Mach 0.78</strong></div>
    <div class="spec"><span>Range</span><strong>5,700 km</strong></div>
    <div class="spec"><span>Ceiling</span><strong>39,800 ft</strong></div>
  </section>

  <div id="controls" class="panel">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

  <div id="liveries">
    <button class="active" data-livery="airbus">Airbus</button>
    <button data-livery="qantas">Qantas</button>
    <button data-livery="jetstar">Jetstar</button>
    <button data-livery="training">Training</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    renderer.outputEncoding = THREE.sRGBEncoding;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x03070e);
    scene.fog = new THREE.FogExp2(0x03070e, 0.015);

    const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 400);
    camera.position.set(0, 4.2, 19);

    const hemi = new THREE.HemisphereLight(0xaac8ff, 0x111018, 0.55);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xfff0d6, 2.7);
    sun.position.set(12, 18, 11);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -22;
    sun.shadow.camera.right = 22;
    sun.shadow.camera.top = 14;
    sun.shadow.camera.bottom = -14;
    scene.add(sun);

    const rim = new THREE.DirectionalLight(0x75a7ff, 1.15);
    rim.position.set(-16, 5, -12);
    scene.add(rim);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(18, 96),
      new THREE.MeshStandardMaterial({ color: 0x121927, metalness: 0.15, roughness: 0.68, transparent: true, opacity: 0.55 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.55;
    floor.receiveShadow = true;
    scene.add(floor);

    function makeStars() {
      const count = 1400;
      const pos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = 70 + Math.random() * 120;
        const a = Math.random() * Math.PI * 2;
        const b = Math.acos(2 * Math.random() - 1);
        pos[i*3] = r * Math.sin(b) * Math.cos(a);
        pos[i*3+1] = r * Math.sin(b) * Math.sin(a);
        pos[i*3+2] = r * Math.cos(b);
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 0.22, transparent: true, opacity: 0.78 })));
    }
    makeStars();

    const liveries = {
      airbus:   { body: 0xf4f8ff, belly: 0xdfe8f4, tail: 0x003b88, stripe: 0x0071c8, accent: 0xf3343a, wing: 0xe6edf7 },
      qantas:   { body: 0xffffff, belly: 0xe8edf4, tail: 0xd71920, stripe: 0xd71920, accent: 0xffffff, wing: 0xe8edf4 },
      jetstar:  { body: 0xf9fafb, belly: 0xe1e5ea, tail: 0xff6f00, stripe: 0xff6f00, accent: 0x111111, wing: 0xe8edf4 },
      training: { body: 0xf5f0de, belly: 0xd8d0bd, tail: 0x16324f, stripe: 0xd99b2b, accent: 0xd99b2b, wing: 0xded8c8 }
    };

    let mats = {};
    const paintables = [];
    function materialSet(l) {
      mats = {
        body: new THREE.MeshStandardMaterial({ color: l.body, metalness: 0.45, roughness: 0.32 }),
        belly: new THREE.MeshStandardMaterial({ color: l.belly, metalness: 0.35, roughness: 0.42 }),
        tail: new THREE.MeshStandardMaterial({ color: l.tail, metalness: 0.28, roughness: 0.48 }),
        stripe: new THREE.MeshStandardMaterial({ color: l.stripe, metalness: 0.25, roughness: 0.48 }),
        accent: new THREE.MeshStandardMaterial({ color: l.accent, metalness: 0.25, roughness: 0.45 }),
        wing: new THREE.MeshStandardMaterial({ color: l.wing, metalness: 0.48, roughness: 0.28 }),
        glass: new THREE.MeshStandardMaterial({ color: 0x4aa5c7, metalness: 0.08, roughness: 0.03, transparent: true, opacity: 0.72 }),
        dark: new THREE.MeshStandardMaterial({ color: 0x10131a, metalness: 0.55, roughness: 0.32 }),
        chrome: new THREE.MeshStandardMaterial({ color: 0xd8e7f7, metalness: 0.92, roughness: 0.06 }),
        rubber: new THREE.MeshStandardMaterial({ color: 0x08090b, metalness: 0.04, roughness: 0.9 })
      };
    }
    materialSet(liveries.airbus);

    const aircraft = new THREE.Group();
    scene.add(aircraft);

    function add(geo, mat, x=0, y=0, z=0, rx=0, ry=0, rz=0, role=null, parent=aircraft) {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      m.rotation.set(rx, ry, rz);
      m.castShadow = true;
      m.receiveShadow = true;
      if (role) paintables.push([m, role]);
      parent.add(m);
      return m;
    }

    const R = 0.72, HL = 4.9;
    add(new THREE.CylinderGeometry(R, R, HL*2, 56), mats.body, 0, 0, 0, Math.PI/2, 0, 0, 'body');
    add(new THREE.CylinderGeometry(R*0.56, R, 2.15, 56), mats.body, 0, 0, HL+1.08, Math.PI/2, 0, 0, 'body');
    add(new THREE.CylinderGeometry(0, R*0.56, 2.8, 56), mats.body, 0, 0, HL+3.55, Math.PI/2, 0, 0, 'body');
    add(new THREE.SphereGeometry(0.25, 28, 16), mats.dark, 0, 0.02, HL+5.12);
    add(new THREE.CylinderGeometry(R*0.34, R, 3.05, 56), mats.body, 0, 0, -HL-1.52, -Math.PI/2, 0, 0, 'body');
    add(new THREE.CylinderGeometry(0, R*0.34, 2.0, 48), mats.body, 0, 0, -HL-4.05, -Math.PI/2, 0, 0, 'body');

    add(new THREE.CylinderGeometry(0.28, 0.28, 5.4, 32), mats.belly, 0, -0.66, -0.42, Math.PI/2, 0, 0, 'belly');
    add(new THREE.CylinderGeometry(R+0.006, R+0.006, 7.6, 56, 1, true, 0, Math.PI*0.57), mats.stripe, 0, 0.01, 0.1, Math.PI/2, Math.PI*0.22, 0, 'stripe');

    for (let side of [-1, 1]) {
      for (let i = -8; i <= 7; i++) {
        if (i === -1 || i === 4) continue;
        add(new THREE.BoxGeometry(0.025, 0.15, 0.24), mats.glass, side*(R+0.012), R*0.42, i*0.67 - 0.25, 0, 0, side*0.08);
      }
      [2.9, -3.0].forEach(z => add(new THREE.BoxGeometry(0.022, 0.82, 0.46), mats.body, side*(R+0.015), 0.02, z, 0, 0, 0, 'body'));
    }

    add(new THREE.BoxGeometry(0.28, 0.17, 0.045), mats.glass, -0.27, R*0.55, HL+2.55, -0.22, 0.25, 0.08);
    add(new THREE.BoxGeometry(0.28, 0.17, 0.045), mats.glass,  0.27, R*0.55, HL+2.55, -0.22, -0.25, -0.08);
    add(new THREE.BoxGeometry(0.25, 0.19, 0.045), mats.glass, -0.13, R*0.58, HL+2.77, -0.25, 0.08, 0);
    add(new THREE.BoxGeometry(0.25, 0.19, 0.045), mats.glass,  0.13, R*0.58, HL+2.77, -0.25, -0.08, 0);

    function wing(side) {
      const span = 7.2, root = 3.45, tip = 0.95, sweep = 0.52, dihedral = 0.075;
      for (let s = 0; s < 14; s++) {
        const t = (s + 0.5) / 14;
        const y = t * span;
        const chord = root + (tip - root) * t;
        const thick = 0.13 * (1 - t*0.63);
        const z = -(y * Math.tan(sweep) - root*0.38 + chord*0.5);
        const m = add(new THREE.BoxGeometry(span/14 + 0.025, thick, chord), mats.wing, side*y, -0.3 + y*Math.sin(dihedral), z, 0, -0.035*t, side*dihedral, 'wing');
        m.scale.y = 1.0;
      }
      [1.4, 3.1, 4.9].forEach(y => {
        const z = -(y*Math.tan(sweep) - root*0.38 + 0.6);
        add(new THREE.BoxGeometry(0.18, 0.16, 0.76), mats.belly, side*y, -0.45 + y*Math.sin(dihedral), z, 0, 0, 0, 'belly');
      });
      for (let p = 0; p < 5; p++) {
        const y = 1.1 + p*0.9;
        const z = -(y*Math.tan(sweep) - root*0.38 + 0.68);
        add(new THREE.BoxGeometry(0.72, 0.025, 0.32), mats.stripe, side*y, -0.235 + y*Math.sin(dihedral), z, 0, 0, 0, 'stripe');
      }
      const ty = span;
      const tz = -(ty*Math.tan(sweep) - root*0.38 + tip*0.5);
      const shark = new THREE.Group();
      shark.position.set(side*ty, -0.25 + ty*Math.sin(dihedral), tz);
      shark.rotation.z = side*0.18;
      add(new THREE.BoxGeometry(0.07, 1.15, 0.68), mats.accent, 0, 0.58, 0, 0, 0, 0, 'accent', shark);
      add(new THREE.BoxGeometry(0.1, 0.12, 0.72), mats.accent, 0, 0.05, 0, 0, 0, 0, 'accent', shark);
      aircraft.add(shark);
    }
    wing(-1); wing(1);

    [-1, 1].forEach(side => {
      for (let s = 0; s < 7; s++) {
        const t = (s + 0.5) / 7;
        const y = t * 3.25;
        const chord = 1.25 - 0.55*t;
        add(new THREE.BoxGeometry(3.25/7 + 0.02, 0.055, chord), mats.body, side*y, 0.02, -HL-2.6-y*0.42, 0, 0, side*0.04, 'body');
      }
    });

    for (let s = 0; s < 9; s++) {
      const t = (s + 0.5) / 9;
      const h = t * 3.25;
      const chord = 2.35 - 1.15*t;
      add(new THREE.BoxGeometry(0.065, 3.25/9 + 0.02, chord), mats.tail, 0, 0.25 + h, -HL-2.35-h*0.56, 0, 0, 0, 'tail');
    }
    add(new THREE.BoxGeometry(0.05, 2.15, 0.48), mats.accent, 0, 1.78, -HL-3.52, 0, 0, 0, 'accent');

    function engine(side) {
      const g = new THREE.Group();
      g.position.set(side*2.55, -0.62, 1.25);
      add(new THREE.CylinderGeometry(0.41, 0.35, 2.35, 44), mats.chrome, 0, 0, 0, Math.PI/2, 0, 0, null, g);
      add(new THREE.CylinderGeometry(0.34, 0.39, 0.56, 44), mats.dark, 0, 0, 1.12, Math.PI/2, 0, 0, null, g);
      add(new THREE.TorusGeometry(0.40, 0.052, 18, 48), mats.chrome, 0, 0, 1.2, 0, 0, 0, null, g);
      add(new THREE.CylinderGeometry(0.29, 0.29, 0.05, 36), mats.dark, 0, 0, 0.96, Math.PI/2, 0, 0, null, g);
      add(new THREE.CylinderGeometry(0, 0.14, 0.42, 26), mats.chrome, 0, 0, 0.78, Math.PI/2, 0, 0, null, g);
      for (let b = 0; b < 20; b++) {
        const a = b/20*Math.PI*2;
        const blade = add(new THREE.BoxGeometry(0.035, 0.19, 0.075), mats.chrome, Math.cos(a)*0.17, Math.sin(a)*0.17, 0.96, 0, 0, a, null, g);
        blade.rotation.z = a + 0.35;
      }
      add(new THREE.CylinderGeometry(0.2, 0.29, 0.34, 32), mats.dark, 0, 0, -1.28, Math.PI/2, 0, 0, null, g);
      add(new THREE.BoxGeometry(0.2, 0.62, 1.55), mats.body, 0, 0.42, 0.1, 0, 0, 0, 'body', g);
      aircraft.add(g);
    }
    engine(-1); engine(1);

    function gear(x,z,dual) {
      const g = new THREE.Group();
      g.position.set(x, -0.62, z);
      add(new THREE.CylinderGeometry(0.045, 0.04, 0.75, 12), mats.chrome, 0, -0.18, 0, 0, 0, 0, null, g);
      const wheels = dual ? [-0.18,0.18] : [0];
      wheels.forEach(wx => {
        add(new THREE.TorusGeometry(0.16, 0.075, 16, 32), mats.rubber, wx, -0.58, 0, Math.PI/2, 0, 0, null, g);
        add(new THREE.CylinderGeometry(0.085, 0.085, 0.045, 22), mats.chrome, wx, -0.58, 0, 0, 0, Math.PI/2, null, g);
      });
      aircraft.add(g);
    }
    gear(0, HL+1.1, false); gear(-1.12, 0.45, true); gear(1.12, 0.45, true);

    add(new THREE.SphereGeometry(0.045, 10, 8), new THREE.MeshStandardMaterial({ color: 0xff2020, emissive: 0xff0000, emissiveIntensity: 1.8 }), -7.1, -0.16, -4.1);
    add(new THREE.SphereGeometry(0.045, 10, 8), new THREE.MeshStandardMaterial({ color: 0x24ff48, emissive: 0x00ff00, emissiveIntensity: 1.8 }), 7.1, -0.16, -4.1);
    add(new THREE.SphereGeometry(0.055, 12, 8), new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0xff2200, emissiveIntensity: 1.3 }), 0, -0.8, -0.2);
    add(new THREE.SphereGeometry(0.055, 12, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88ccff, emissiveIntensity: 1.0 }), 0, 0.8, -0.2);

    aircraft.rotation.x = 0.1;
    aircraft.rotation.y = 0.55;

    const state = { dragging:false, right:false, px:0, py:0, rx:0.1, ry:0.55, tx:0.1, ty:0.55, zoom:19, tz:19, panX:0, panY:0, tPanX:0, tPanY:0, auto:true };
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('mousedown', e => { state.dragging = true; state.right = e.button === 2; state.px = e.clientX; state.py = e.clientY; state.auto = false; });
    addEventListener('mousemove', e => {
      if (!state.dragging) return;
      const dx = e.clientX - state.px, dy = e.clientY - state.py;
      if (state.right) { state.tPanX += dx*0.012; state.tPanY -= dy*0.012; }
      else { state.ty += dx*0.01; state.tx = Math.max(-1.05, Math.min(1.05, state.tx + dy*0.01)); }
      state.px = e.clientX; state.py = e.clientY;
    });
    addEventListener('mouseup', () => state.dragging = false);
    canvas.addEventListener('wheel', e => { e.preventDefault(); state.tz = Math.max(7, Math.min(30, state.tz + e.deltaY*0.022)); }, { passive:false });

    document.querySelectorAll('button[data-livery]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        materialSet(liveries[btn.dataset.livery]);
        paintables.forEach(([m, role]) => { if (mats[role]) m.material = mats[role]; });
      });
    });

    function resize() {
      const w = innerWidth, h = innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w/h;
      camera.updateProjectionMatrix();
    }
    addEventListener('resize', resize); resize();

    function animate() {
      requestAnimationFrame(animate);
      if (state.auto && !state.dragging) state.ty += 0.0026;
      aircraft.rotation.x += (state.tx - aircraft.rotation.x) * 0.12;
      aircraft.rotation.y += (state.ty - aircraft.rotation.y) * 0.12;
      state.zoom += (state.tz - state.zoom) * 0.1;
      state.panX += (state.tPanX - state.panX) * 0.1;
      state.panY += (state.tPanY - state.panY) * 0.1;
      camera.position.set(state.panX, 4.1 + state.panY, state.zoom);
      camera.lookAt(state.panX, state.panY, 0);
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>

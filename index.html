<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airbus A320 — Interactive 3D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #05080f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 20px 24px;
      pointer-events: none;
      z-index: 10;
    }

    #title-block h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }

    #title-block p {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      transition: opacity 0.6s;
      pointer-events: none;
      z-index: 10;
    }

    #livery-switcher {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .livery-btn {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.04em;
    }

    .livery-btn:hover, .livery-btn.active {
      background: rgba(255,255,255,0.16);
      color: #fff;
    }

    #stats {
      position: fixed;
      top: 70px;
      left: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
    }

    .stat {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    .stat span {
      color: rgba(255,255,255,0.65);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

<div id="canvas-container">
  <canvas id="c"></canvas>
</div>

<div id="ui">
  <div id="title-block">
    <h1>Airbus A320-200</h1>
    <p>CFM56-5B · Fly-by-wire</p>
  </div>
</div>

<div id="stats">
  <div class="stat">Length <span>37.57 m</span></div>
  <div class="stat">Wingspan <span>35.80 m</span></div>
  <div class="stat">Cruise <span>Mach 0.78</span></div>
  <div class="stat">Range <span>5,700 km</span></div>
  <div class="stat">Ceiling <span>39,800 ft</span></div>
</div>

<div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

<div id="livery-switcher">
  <button class="livery-btn active" onclick="setLivery('airbus')">Airbus House</button>
  <button class="livery-btn" onclick="setLivery('air-france')">Air France</button>
  <button class="livery-btn" onclick="setLivery('lufthansa')">Lufthansa</button>
  <button class="livery-btn" onclick="setLivery('easyjet')">easyJet</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(42, 1, 0.05, 500);
camera.position.set(0, 4, 20);

// ─── Lights ───────────────────────────────────────────────────────────────────
const ambient = new THREE.HemisphereLight(0xb0c8ff, 0x202030, 0.6);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff4e0, 2.2);
keyLight.position.set(12, 18, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -20;
keyLight.shadow.camera.right = 20;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x80aaff, 0.8);
rimLight.position.set(-15, 5, -8);
scene.add(rimLight);

const underLight = new THREE.DirectionalLight(0x304060, 0.3);
underLight.position.set(0, -10, 0);
scene.add(underLight);

// ─── Environment / background ────────────────────────────────────────────────
scene.background = new THREE.Color(0x05080f);
scene.fog = new THREE.FogExp2(0x05080f, 0.018);

// Stars
(function makeStars() {
  const count = 1200;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = 80 + Math.random() * 100;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) sizes[i] = 0.15 + Math.random() * 0.35;
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.3, sizeAttenuation: true, transparent: true, opacity: 0.8
  })));
})();

// ─── Materials ────────────────────────────────────────────────────────────────
const MAT = {};

function buildMaterials(livery) {
  const l = livery;
  MAT.fuselage    = new THREE.MeshStandardMaterial({ color: l.fuselage,    metalness: 0.45, roughness: 0.35 });
  MAT.fuselageBot = new THREE.MeshStandardMaterial({ color: l.belly,       metalness: 0.4,  roughness: 0.45 });
  MAT.tail        = new THREE.MeshStandardMaterial({ color: l.tail,        metalness: 0.2,  roughness: 0.55 });
  MAT.engine      = new THREE.MeshStandardMaterial({ color: 0x7a8fa0,      metalness: 0.75, roughness: 0.25 });
  MAT.engineDark  = new THREE.MeshStandardMaterial({ color: 0x1a1f26,      metalness: 0.8,  roughness: 0.2  });
  MAT.glass       = new THREE.MeshStandardMaterial({ color: 0x4488aa,      metalness: 0.05, roughness: 0.05, transparent: true, opacity: 0.75 });
  MAT.rubber      = new THREE.MeshStandardMaterial({ color: 0x111115,      metalness: 0.1,  roughness: 0.9  });
  MAT.chrome      = new THREE.MeshStandardMaterial({ color: 0xccddee,      metalness: 0.95, roughness: 0.05 });
  MAT.stripe      = new THREE.MeshStandardMaterial({ color: l.stripe,      metalness: 0.2,  roughness: 0.5  });
  MAT.wingTop     = new THREE.MeshStandardMaterial({ color: l.wing,        metalness: 0.5,  roughness: 0.3  });
  MAT.sharklet    = new THREE.MeshStandardMaterial({ color: l.sharklet,    metalness: 0.2,  roughness: 0.6  });
  MAT.nose        = new THREE.MeshStandardMaterial({ color: 0x1a1a22,      metalness: 0.3,  roughness: 0.7  });
}

const LIVERIES = {
  'airbus':     { fuselage: 0xf0f4ff, belly: 0xdde3ee, tail: 0x003070, stripe: 0x003070, wing: 0xe8edf8, sharklet: 0xff3333 },
  'air-france': { fuselage: 0xf4f7ff, belly: 0xdde3ee, tail: 0x002395, stripe: 0xed2939, wing: 0xe8edf8, sharklet: 0xed2939 },
  'lufthansa':  { fuselage: 0xfafcff, belly: 0xe0e5ee, tail: 0x05164d, stripe: 0xffd700, wing: 0xe8edf8, sharklet: 0xffd700 },
  'easyjet':    { fuselage: 0xfafafa, belly: 0xe0e0e0, tail: 0xff6600, stripe: 0xff6600, wing: 0xe8edf8, sharklet: 0xff6600 },
};

buildMaterials(LIVERIES['airbus']);

// ─── Geometry helpers ────────────────────────────────────────────────────────
const group = new THREE.Group();
scene.add(group);

function mesh(geo, mat, px=0, py=0, pz=0, rx=0, ry=0, rz=0) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(px, py, pz);
  m.rotation.set(rx, ry, rz);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

function add(geo, mat, px, py, pz, rx, ry, rz) {
  const m = mesh(geo, mat, px, py, pz, rx, ry, rz);
  group.add(m);
  return m;
}

// ─── FUSELAGE ────────────────────────────────────────────────────────────────
// Main cabin tube — 32 radial segments for smooth look
const R = 0.70; // radius
const HL = 4.8; // half-length of main cylinder

// Main cabin
add(new THREE.CylinderGeometry(R, R, HL*2, 40, 1, false), MAT.fuselage, 0, 0, 0, Math.PI/2, 0, 0);

// Forward fuselage taper
add(new THREE.CylinderGeometry(R*0.55, R, 2.2, 40), MAT.fuselage, 0, 0, HL+1.1, Math.PI/2, 0, 0);

// Nose cone (pointed)
add(new THREE.CylinderGeometry(0, R*0.55, 2.8, 40), MAT.fuselage, 0, 0, HL+2.2+1.4, Math.PI/2, 0, 0);

// Radome (black nose tip)
add(new THREE.SphereGeometry(0.28, 20, 16, 0, Math.PI*2, 0, Math.PI/2), MAT.nose, 0, 0, HL+5.55);

// Aft fuselage taper
add(new THREE.CylinderGeometry(R*0.35, R, 3.2, 40), MAT.fuselage, 0, 0, -(HL+1.6), -Math.PI/2, 0, 0);

// Tail cone
add(new THREE.CylinderGeometry(0, R*0.35, 2.0, 40), MAT.fuselage, 0, 0, -(HL+3.2+1.0), -Math.PI/2, 0, 0);

// APU exhaust nozzle
add(new THREE.CylinderGeometry(0.07, 0.09, 0.3, 12), MAT.engineDark, 0, R*0.15, -(HL+5.18));

// Belly fairing
add(new THREE.CylinderGeometry(0.26, 0.26, 5.5, 20), MAT.fuselageBot, 0, -(R-0.05), -0.5, Math.PI/2, 0, 0);
add(new THREE.SphereGeometry(0.26, 20, 10, 0, Math.PI*2, 0, Math.PI/2), MAT.fuselageBot, 0, -(R-0.05), -3.25, -Math.PI/2, 0, 0);
add(new THREE.SphereGeometry(0.26, 20, 10, 0, Math.PI*2, 0, Math.PI/2), MAT.fuselageBot, 0, -(R-0.05), 2.25, 0, 0, 0);

// Cheatline / window stripe
add(new THREE.CylinderGeometry(R+0.003, R+0.003, HL*1.6, 40, 1, true, 0, Math.PI*0.62), MAT.stripe,
  0, 0, 0, Math.PI/2, Math.PI*0.19, 0);

// ─── COCKPIT WINDOWS ────────────────────────────────────────────────────────
// Captain side window
const cwGeo = new THREE.BoxGeometry(0.22, 0.16, 0.04);
add(cwGeo, MAT.glass, -0.3, R*0.48, HL+2.6, -0.18, 0.3, 0.1);
// FO side window
add(cwGeo, MAT.glass, 0.3, R*0.48, HL+2.6, -0.18, -0.3, -0.1);
// Center windshield pair
add(new THREE.BoxGeometry(0.25, 0.20, 0.04), MAT.glass, -0.14, R*0.52, HL+2.75, -0.25, 0.1, 0);
add(new THREE.BoxGeometry(0.25, 0.20, 0.04), MAT.glass, 0.14, R*0.52, HL+2.75, -0.25, -0.1, 0);

// ─── CABIN WINDOWS ───────────────────────────────────────────────────────────
for (let side = -1; side <= 1; side += 2) {
  for (let i = -8; i <= 6; i++) {
    if (i === 0) continue; // door position
    const wz = i * 0.72 - 0.3;
    const wy = R * 0.42;
    const wx = side * (R + 0.005);
    const wm = mesh(new THREE.BoxGeometry(0.02, 0.165, 0.235), MAT.glass, wx, wy, wz, 0, 0, side * 0.06);
    group.add(wm);
    // Window frame
    const fm = mesh(new THREE.BoxGeometry(0.025, 0.21, 0.28), MAT.fuselage, wx*0.995, wy, wz);
    fm.renderOrder = -1;
    group.add(fm);
  }
}

// ─── DOORS ──────────────────────────────────────────────────────────────────
[-1,1].forEach(side => {
  [HL*0.55, -HL*0.5].forEach(dz => {
    add(new THREE.BoxGeometry(0.015, 0.85, 0.48), MAT.fuselage, side*(R+0.002), R*0.05, dz);
  });
});

// ─── WINGS ───────────────────────────────────────────────────────────────────
function makeWing(side) {
  const wg = new THREE.Group();

  // Wing root — thick airfoil cross-section approximated by tapered box
  // Segments: root chord ~3.5u, tip chord ~1.0u, span ~7u, swept ~25°
  const pts = [];
  const wingSpan = 7.2;
  const rootChord = 3.5;
  const tipChord  = 1.0;
  const sweep     = 0.52; // rad, ~30°
  const dihedral  = 0.07;
  const twist     = -0.06;
  const SEGS = 12;

  // Build wing as series of tapered quads using BufferGeometry
  // Using multiple BoxGeometry segments for simplicity & compatibility
  for (let s = 0; s < SEGS; s++) {
    const t0 = s / SEGS;
    const t1 = (s+1) / SEGS;
    const y0 = t0 * wingSpan;
    const y1 = t1 * wingSpan;
    const chord0 = rootChord + (tipChord - rootChord) * t0;
    const chord1 = rootChord + (tipChord - rootChord) * t1;
    const chordMid = (chord0 + chord1) / 2;
    const yMid = (y0 + y1) / 2;
    const thick = 0.11 * (1 - t0 * 0.65);
    const xOff  = yMid * Math.tan(sweep);
    const yOff  = yMid * Math.sin(dihedral);
    const segW  = (y1 - y0);
    const w = mesh(
      new THREE.BoxGeometry(segW + 0.02, thick, chordMid),
      MAT.wingTop,
      side * (yMid),
      yOff - 0.28,
      -(xOff - rootChord*0.38 + chordMid*0.5 - chord0*0.05)
    );
    w.rotation.z = side * dihedral;
    w.rotation.y = twist * t0;
    group.add(w);
  }

  // Wing root fillet
  add(new THREE.CylinderGeometry(0.18, 0.18, rootChord, 16, 1, false, 0, Math.PI),
    MAT.wingTop, side*0.1, -0.22, -(rootChord*0.38 - rootChord/2), 0, side < 0 ? 0 : Math.PI, 0);

  // Flap track fairings (3 per wing)
  [1.5, 3.2, 5.0].forEach(fy => {
    const fz  = -(fy * Math.tan(sweep) - rootChord*0.38 + 0.6);
    const fyh = fy * Math.sin(dihedral) - 0.28;
    add(new THREE.BoxGeometry(0.18, 0.18, 0.7), MAT.fuselageBot,
      side * fy, fyh - 0.14, fz + 0.3);
  });

  // Aileron (outboard trailing edge)
  const alz = -(5.5*Math.tan(sweep) - rootChord*0.38 + 0.85);
  const aly = 5.5*Math.sin(dihedral) - 0.27;
  add(new THREE.BoxGeometry(1.2, 0.05, 0.42), MAT.wingTop, side*5.5, aly, alz);

  // Spoilers (5 panels, inboard)
  for (let sp = 0; sp < 5; sp++) {
    const sy = 1.2 + sp * 0.9;
    const spz = -(sy * Math.tan(sweep) - rootChord*0.38 + 0.7);
    const spy = sy * Math.sin(dihedral) - 0.265;
    add(new THREE.BoxGeometry(0.85, 0.03, 0.38), MAT.wingTop, side*sy, spy, spz);
  }

  // Sharklet winglet
  const wlSpan = 6.95;
  const wlY = wlSpan * Math.sin(dihedral) - 0.28;
  const wlX = side * wlSpan;
  const wlZ = -(wlSpan * Math.tan(sweep) - rootChord*0.38 + tipChord*0.5);
  const sk = new THREE.Group();
  // Main sharklet blade
  const skBlade = mesh(new THREE.BoxGeometry(0.06, 1.1, 0.7), MAT.sharklet, 0, 0.5, 0);
  skBlade.rotation.z = side * 0.2;
  sk.add(skBlade);
  // Sharklet base
  sk.add(mesh(new THREE.BoxGeometry(0.1, 0.12, 0.72), MAT.sharklet, 0, 0.02, 0));
  sk.position.set(wlX, wlY, wlZ);
  sk.rotation.x = twist * -2;
  group.add(sk);

  // Leading edge slats (5 panels)
  for (let sl = 0; sl < 5; sl++) {
    const sly = 0.3 + sl * 1.25;
    const slz = -(sly * Math.tan(sweep) - rootChord*0.38 + rootChord - sly*(rootChord-tipChord)/wingSpan - 0.15);
    const slydh = sly * Math.sin(dihedral) - 0.28;
    add(new THREE.BoxGeometry(1.1, 0.06, 0.18), MAT.wingTop, side*sly, slydh, slz + 0.02);
  }
}

makeWing(-1);
makeWing(1);

// ─── HORIZONTAL STABILIZERS ──────────────────────────────────────────────────
[-1, 1].forEach(side => {
  const hSpan = 3.2;
  const hChord = 1.3;
  const hSweep = 0.38;
  for (let s = 0; s < 6; s++) {
    const t0 = s/6, t1 = (s+1)/6;
    const yMid = ((t0+t1)/2) * hSpan;
    const chordMid = hChord - hChord*0.45*(t0+t1)/2;
    const xOff = yMid * Math.tan(hSweep);
    add(new THREE.BoxGeometry((hSpan/6)+0.02, 0.05, chordMid), MAT.fuselage,
      side * yMid, R*0.25 - 0.12, -(HL+2.8 + xOff - hChord*0.3 + chordMid*0.5));
  }
  // Elevator
  add(new THREE.BoxGeometry(hSpan*0.55, 0.035, 0.45), MAT.fuselage,
    side * hSpan*0.65, R*0.25-0.1, -(HL+2.8 + hSpan*0.65*Math.tan(hSweep) - 0.18));
});

// ─── VERTICAL STABILIZER ────────────────────────────────────────────────────
const vH = 3.2, vChord = 2.4, vSweep = 0.52;
for (let s = 0; s < 8; s++) {
  const t0 = s/8, t1 = (s+1)/8;
  const yMid = ((t0+t1)/2) * vH;
  const chordMid = vChord - vChord*0.52*(t0+t1)/2;
  const xOff = yMid * Math.tan(vSweep);
  add(new THREE.BoxGeometry(0.06, vH/8+0.02, chordMid), MAT.tail,
    0, R*0.18 + yMid, -(HL+2.4 + xOff - vChord*0.3 + chordMid*0.5));
}
// Rudder
add(new THREE.BoxGeometry(0.04, vH*0.72, 0.55), MAT.tail,
  0, R*0.18 + vH*0.5, -(HL+2.4 + vH*0.5*Math.tan(vSweep) - 0.22));

// ─── ENGINES (CFM56-5B) ───────────────────────────────────────────────────────
function makeEngine(side) {
  const eg = new THREE.Group();
  const ey = -0.55;
  const ez = 1.4;  // forward of wing
  const ex = side * 2.6;

  // Nacelle outer shell
  const nac = mesh(new THREE.CylinderGeometry(0.38, 0.34, 2.4, 32, 1, false), MAT.engine);
  nac.rotation.x = Math.PI/2;
  eg.add(nac);

  // Intake lip (torus)
  const lip = mesh(new THREE.TorusGeometry(0.38, 0.055, 16, 40), MAT.chrome, 0, 0, 1.2);
  eg.add(lip);

  // Intake duct (dark inside)
  eg.add(mesh(new THREE.CylinderGeometry(0.32, 0.38, 0.6, 32), MAT.engineDark, 0, 0, 1.25, Math.PI/2, 0, 0));

  // Fan disk
  eg.add(mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.06, 32), MAT.engineDark, 0, 0, 0.99, Math.PI/2, 0, 0));

  // Fan spinner cone
  eg.add(mesh(new THREE.CylinderGeometry(0, 0.14, 0.45, 24), MAT.chrome, 0, 0, 0.8, Math.PI/2, 0, 0));

  // Fan blades (18 blades)
  for (let b = 0; b < 18; b++) {
    const blade = mesh(
      new THREE.BoxGeometry(0.04, 0.18, 0.09),
      MAT.engine, 0, 0, 0.99
    );
    blade.rotation.z = (b / 18) * Math.PI * 2;
    blade.position.x = Math.cos((b/18)*Math.PI*2) * 0.185;
    blade.position.y = Math.sin((b/18)*Math.PI*2) * 0.185;
    eg.add(blade);
  }

  // Exhaust nozzle
  eg.add(mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.25, 24), MAT.engineDark, 0, 0, -1.32, Math.PI/2, 0, 0));
  // Hot exhaust plug
  eg.add(mesh(new THREE.CylinderGeometry(0, 0.16, 0.6, 20), MAT.engineDark, 0, 0, -1.48, -Math.PI/2, 0, 0));

  // Nacelle strake (small vortex generators)
  eg.add(mesh(new THREE.BoxGeometry(0.02, 0.06, 0.4), MAT.engine, 0, 0.385, 0.3));
  eg.add(mesh(new THREE.BoxGeometry(0.02, 0.06, 0.4), MAT.engine, 0.385, 0, 0.3, 0, 0, Math.PI/2));

  // Pylon
  const pylon = new THREE.Group();
  pylon.add(mesh(new THREE.BoxGeometry(0.18, 0.55, 1.8), MAT.fuselage, 0, 0.3, 0));
  // Pylon fillet
  pylon.add(mesh(new THREE.BoxGeometry(0.22, 0.14, 1.8), MAT.fuselage, 0, 0.58, 0));
  eg.add(pylon);

  eg.position.set(ex, ey, ez);
  group.add(eg);
}

makeEngine(-1);
makeEngine(1);

// ─── LANDING GEAR ────────────────────────────────────────────────────────────
function makeGear(x, y, z, dual=false) {
  const g = new THREE.Group();
  // Main strut
  g.add(mesh(new THREE.CylinderGeometry(0.055, 0.045, 0.8, 10), MAT.engine, 0, -0.1, 0));
  // Axle
  g.add(mesh(new THREE.CylinderGeometry(0.03, 0.03, dual ? 0.7 : 0.4, 8), MAT.engine, 0, -0.55, 0, 0, 0, Math.PI/2));
  // Wheels
  const wheelPositions = dual ? [-0.18, 0.18] : [0];
  wheelPositions.forEach(wx => {
    // Tire
    g.add(mesh(new THREE.TorusGeometry(0.165, 0.085, 12, 28), MAT.rubber, wx, -0.55, 0, Math.PI/2, 0, 0));
    // Hub
    g.add(mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.04, 20), MAT.chrome, wx, -0.55, 0, 0, 0, Math.PI/2));
  });
  g.position.set(x, y, z);
  group.add(g);
}

// Nose gear
makeGear(0, -R+0.05, HL+1.2, false);
// Main gear left (dual wheels)
makeGear(-1.15, -R+0.05, 0.5, true);
// Main gear right (dual wheels)
makeGear(1.15, -R+0.05, 0.5, true);

// Gear doors
add(new THREE.BoxGeometry(0.5, 0.04, 0.6), MAT.fuselageBot, 0, -R+0.02, HL+1.2);
add(new THREE.BoxGeometry(0.85, 0.04, 0.95), MAT.fuselageBot, -1.1, -R+0.02, 0.5);
add(new THREE.BoxGeometry(0.85, 0.04, 0.95), MAT.fuselageBot, 1.1, -R+0.02, 0.5);

// ─── ANTENNAS / DETAILS ──────────────────────────────────────────────────────
// VHF antenna (blade)
add(new THREE.BoxGeometry(0.015, 0.22, 0.18), MAT.engineDark, 0.6, R, HL*0.3);
add(new THREE.BoxGeometry(0.015, 0.22, 0.18), MAT.engineDark, -0.5, R, -HL*0.2);
// Satcom dome
add(new THREE.SphereGeometry(0.12, 12, 8), MAT.engine, 0, R+0.08, -HL*0.15);
// Static dischargers (wing tips)
[-1,1].forEach(s => {
  add(new THREE.CylinderGeometry(0.005, 0.005, 0.25, 6), MAT.engineDark, s*7.1, -0.1, -4.2);
});

// Position lights
add(new THREE.SphereGeometry(0.045, 8, 6), new THREE.MeshStandardMaterial({color:0xff2222, emissive:0xff0000, emissiveIntensity:1.5}), -7.05, -0.08, -4.1);
add(new THREE.SphereGeometry(0.045, 8, 6), new THREE.MeshStandardMaterial({color:0x22ff22, emissive:0x00ff00, emissiveIntensity:1.5}), 7.05, -0.08, -4.1);
// Beacon
add(new THREE.SphereGeometry(0.06, 8, 6), new THREE.MeshStandardMaterial({color:0xff3300, emissive:0xff2200, emissiveIntensity:1.2}), 0, -R-0.06, -HL*0.1);

// ─── INITIAL POSE ─────────────────────────────────────────────────────────────
group.rotation.y = 0.5;
group.rotation.x = 0.08;

// ─── ORBIT CONTROLS (manual) ─────────────────────────────────────────────────
const state = {
  dragging: false,
  rightDrag: false,
  prevX: 0, prevY: 0,
  velX: 0, velY: 0,
  autoRotate: true,
  targetY: 0.5,
  targetX: 0.08,
  zoom: 20,
  targetZoom: 20,
  panX: 0, panY: 0,
  targetPanX: 0, targetPanY: 0,
};

canvas.addEventListener('contextmenu', e => e.preventDefault());

function getXY(e) {
  return e.touches ? [e.touches[0].clientX, e.touches[0].clientY] : [e.clientX, e.clientY];
}

canvas.addEventListener('mousedown', e => {
  state.dragging = true;
  state.rightDrag = e.button === 2;
  state.autoRotate = false;
  [state.prevX, state.prevY] = getXY(e);
  state.velX = state.velY = 0;
  document.getElementById('hint').style.opacity = '0';
});
canvas.addEventListener('touchstart', e => {
  state.dragging = true;
  state.autoRotate = false;
  [state.prevX, state.prevY] = getXY(e);
  state.velX = state.velY = 0;
}, { passive: true });

window.addEventListener('mousemove', e => {
  if (!state.dragging) return;
  const [cx, cy] = getXY(e);
  const dx = cx - state.prevX;
  const dy = cy - state.prevY;
  if (state.rightDrag) {
    state.targetPanX += dx * 0.012;
    state.targetPanY -= dy * 0.012;
  } else {
    state.targetY += dx * 0.010;
    state.targetX += dy * 0.010;
    state.targetX = Math.max(-1.1, Math.min(1.1, state.targetX));
    state.velX = dx * 0.010;
    state.velY = dy * 0.010;
  }
  state.prevX = cx; state.prevY = cy;
});
window.addEventListener('touchmove', e => {
  if (!state.dragging) return;
  e.preventDefault();
  const [cx, cy] = getXY(e);
  const dx = cx - state.prevX, dy = cy - state.prevY;
  state.targetY += dx * 0.010;
  state.targetX += dy * 0.010;
  state.targetX = Math.max(-1.1, Math.min(1.1, state.targetX));
  state.velX = dx * 0.010;
  state.velY = dy * 0.010;
  state.prevX = cx; state.prevY = cy;
}, { passive: false });

window.addEventListener('mouseup', () => { state.dragging = false; state.rightDrag = false; });
window.addEventListener('touchend', () => { state.dragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  state.targetZoom = Math.max(6, Math.min(32, state.targetZoom + e.deltaY * 0.025));
}, { passive: false });

// ─── LIVERY SWITCHER ─────────────────────────────────────────────────────────
let currentLivery = 'airbus';

window.setLivery = function(name) {
  if (name === currentLivery) return;
  currentLivery = name;
  document.querySelectorAll('.livery-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(name.split('-')[0])));
  buildMaterials(LIVERIES[name]);

  group.traverse(obj => {
    if (!obj.isMesh) return;
    const m = obj.material;
    if (!m) return;
    // Heuristic re-apply by color proximity
    const col = m.color.getHex();
    if (col === MAT.fuselage.color.getHex() || isClose(col, 0xf0f4ff)) obj.material = MAT.fuselage;
  });

  // Rebuild materials across all meshes by role — simpler: rebuild whole group
  rebuildLivery();
};

function isClose(a, b, tol=0x202020) { return Math.abs(a-b) < tol; }

// Store mesh roles for livery switching
const meshRoles = new Map();
group.traverse(obj => {
  if (!obj.isMesh) return;
  const c = obj.material?.color?.getHex();
  if (c === 0xf0f4ff || c === 0xfafcff || c === 0xfafafa) meshRoles.set(obj, 'fuselage');
  else if (c === 0xdde3ee || c === 0xe0e5ee || c === 0xe0e0e0) meshRoles.set(obj, 'belly');
  else if (c === 0x003070 || c === 0x002395 || c === 0x05164d || c === 0xff6600) meshRoles.set(obj, 'tail');
});

function rebuildLivery() {
  buildMaterials(LIVERIES[currentLivery]);
  meshRoles.forEach((role, obj) => {
    if (role === 'fuselage') obj.material = MAT.fuselage;
    else if (role === 'belly') obj.material = MAT.fuselageBot;
    else if (role === 'tail') obj.material = MAT.tail;
  });
}

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (!state.dragging) {
    if (state.autoRotate) {
      state.targetY += 0.003;
    } else {
      state.velX *= 0.92;
      state.velY *= 0.92;
      state.targetY += state.velX;
      state.targetX += state.velY;
      state.targetX = Math.max(-1.1, Math.min(1.1, state.targetX));
    }
  }

  // Smooth damp
  group.rotation.y += (state.targetY - group.rotation.y) * 0.12;
  group.rotation.x += (state.targetX - group.rotation.x) * 0.12;
  state.zoom += (state.targetZoom - state.zoom) * 0.1;
  state.panX += (state.targetPanX - state.panX) * 0.1;
  state.panY += (state.targetPanY - state.panY) * 0.1;

  camera.position.set(state.panX, 4 + state.panY, state.zoom);
  camera.lookAt(state.panX, state.panY, 0);

  renderer.render(scene, camera);
}
animate();
</script>

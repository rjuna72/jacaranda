
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SBOM Dependency Page</title>
</head>
<body style="margin:0;font-family:Arial;background:#020617;color:white;padding:20px;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div>
      <h1>SBOM Dependency Tree</h1>
      <p>Track aircraft software dependencies</p>
    </div>
    <a href="landing_page.html" style="padding:12px 18px;background:#0ea5e9;border-radius:999px;color:white;text-decoration:none;">Back to Landing</a>
  </div>

  <div style="display:grid;grid-template-columns:350px 1fr;gap:20px;">
    <div style="background:#111827;padding:20px;border-radius:20px;">
      <h2>Add SBOM Entry</h2>
      <input placeholder="Component Name" style="width:100%;padding:10px;margin:8px 0;background:#1f2937;color:white;border:none;border-radius:10px;">
      <input placeholder="Aircraft" style="width:100%;padding:10px;margin:8px 0;background:#1f2937;color:white;border:none;border-radius:10px;">
      <textarea placeholder="Dependencies" style="width:100%;height:120px;padding:10px;margin:8px 0;background:#1f2937;color:white;border:none;border-radius:10px;"></textarea>
      <button style="width:100%;padding:12px;background:#0ea5e9;color:white;border:none;border-radius:12px;">Add SBOM</button>
    </div>

    <div style="background:#111827;padding:20px;border-radius:20px;">
      <h2>Dependency Tree</h2>
      <div style="display:flex;gap:30px;margin-top:30px;">
        <div>
          <h3>Aircraft</h3>
          <div style="background:#1f2937;padding:12px;border-radius:12px;margin-top:10px;">A320-200</div>
        </div>
        <div>
          <h3>Subsystem</h3>
          <div style="background:#1f2937;padding:12px;border-radius:12px;margin-top:10px;">Flight Computer</div>
        </div>
        <div>
          <h3>SBOM</h3>
          <div style="background:#1f2937;padding:12px;border-radius:12px;margin-top:10px;">FMC-SBOM-0482</div>
        </div>
        <div>
          <h3>Dependency</h3>
          <div style="background:#1f2937;padding:12px;border-radius:12px;margin-top:10px;">OpenSSL → GPSD → NavDB</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
